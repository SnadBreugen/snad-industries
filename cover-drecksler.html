<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THE DRECKSLER — promo banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#070707; --red:#ff1a1a; --ink:#f2efe6; --dim:#8d8b82; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#000;color:var(--ink);font-family:"Space Mono",monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}

  .banner{position:relative;width:1200px;height:630px;overflow:hidden;background:#070707;
    background-image:radial-gradient(120% 90% at 82% 50%,rgba(255,26,26,.12),transparent 55%);}
  .banner::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:6;opacity:.45;
    background:repeating-linear-gradient(to bottom,rgba(255,255,255,.04) 0 1px,transparent 1px 3px)}

  .inner{position:relative;z-index:3;height:100%;display:flex;flex-direction:column;justify-content:center;padding:64px 70px;max-width:640px}
  .kicker{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .kicker .wave{width:46px;height:26px;color:var(--red);flex:0 0 auto;filter:drop-shadow(0 0 8px rgba(255,26,26,.55))}
  .kicker .by{font-size:13px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--dim)}
  .word{font-family:"Pixelify Sans",monospace;font-weight:700;line-height:.95;font-size:100px;letter-spacing:0;color:var(--red);text-shadow:0 0 30px rgba(255,26,26,.45)}
  .tag{margin-top:24px;max-width:540px;font-size:21px;line-height:1.5;color:#d9d6cc}
  .tag b{color:var(--ink);font-weight:700}

  .rig{position:absolute;right:104px;top:50%;transform:translateY(-50%);z-index:2;width:300px;height:360px;
    filter:drop-shadow(0 0 26px rgba(255,26,26,.32));animation:bob 4.5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(-50%)}50%{transform:translateY(-55%)}}
  .rig svg{width:100%;height:100%}
  .wv path{animation:pulse 1.8s ease-in-out infinite}
  .wv path:nth-child(2),.wv path:nth-child(4){animation-delay:.25s}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.95}}

  .ticker{position:absolute;left:0;right:0;bottom:0;z-index:5;height:54px;background:var(--red);overflow:hidden;display:flex;align-items:center;border-top:3px solid #070707}
  .tk{display:flex;white-space:nowrap;animation:scroll 22s linear infinite}
  .tk span{font-family:"Space Mono",monospace;font-weight:700;font-size:17px;letter-spacing:2px;color:#1a0000;padding:0 22px}
  .tk span b{color:#330000}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
</style>
<script>(function(){var F=true,q=[];var R=window.requestAnimationFrame.bind(window),I=window.setInterval.bind(window),T=window.setTimeout.bind(window);window.requestAnimationFrame=function(c){if(F){q.push([0,c]);return 0}return R(c)};window.setTimeout=function(c,d){var a=[].slice.call(arguments,2);if(F){q.push([1,c,d,a]);return 0}return T.apply(null,[c,d].concat(a))};window.setInterval=function(c,d){var a=[].slice.call(arguments,2);if(F){q.push([2,c,d,a]);return 0}return I.apply(null,[c,d].concat(a))};function rel(){if(!F)return;F=false;var s=document.getElementById('__fz');if(s)s.remove();try{document.documentElement.classList.remove('snadfrozen')}catch(e){}window.requestAnimationFrame=R;window.setTimeout=function(c,d){var a=[].slice.call(arguments,2);return T.apply(null,[c,d].concat(a))};window.setInterval=function(c,d){var a=[].slice.call(arguments,2);return I.apply(null,[c,d].concat(a))};q.forEach(function(it){if(it[0]===0)R(it[1]);else if(it[0]===1)T.apply(null,[it[1],it[2]].concat(it[3]));else I.apply(null,[it[1],it[2]].concat(it[3]))});q=[]}window.__snadRelease=rel;window.addEventListener('message',function(e){if(e&&e.data==='snad:play')rel()},false);try{var st=document.createElement('style');st.id='__fz';st.textContent='.snadfrozen *{animation-play-state:paused!important;transition:none!important}';document.documentElement.appendChild(st);document.documentElement.classList.add('snadfrozen')}catch(e){}if(window.top===window.self){T(rel,60)}})();</script>
</head>
<body>
  <div class="banner">
    <div class="rig" aria-hidden="true">
      <svg viewBox="0 0 300 360">
        <!-- sound waves -->
        <g class="wv" fill="none" stroke="#ff1a1a" stroke-width="6" stroke-linecap="round">
          <path d="M84 116 q-20 64 0 128"/>
          <path d="M58 92 q-40 88 0 176"/>
          <path d="M216 116 q20 64 0 128"/>
          <path d="M242 92 q40 88 0 176"/>
        </g>
        <!-- mic capsule -->
        <rect x="118" y="36" width="64" height="152" rx="32" fill="#f2efe6"/>
        <rect x="118" y="36" width="64" height="152" rx="32" fill="none" stroke="#ff1a1a" stroke-width="3" opacity=".6"/>
        <g stroke="#0a0a0a" stroke-width="4" opacity=".5">
          <line x1="128" y1="66" x2="172" y2="66"/>
          <line x1="128" y1="84" x2="172" y2="84"/>
          <line x1="128" y1="102" x2="172" y2="102"/>
          <line x1="128" y1="120" x2="172" y2="120"/>
        </g>
        <!-- yoke + stand -->
        <path d="M96 150 a54 54 0 0 0 108 0" fill="none" stroke="#f2efe6" stroke-width="8"/>
        <line x1="150" y1="204" x2="150" y2="250" stroke="#f2efe6" stroke-width="8"/>
        <rect x="108" y="250" width="84" height="12" rx="6" fill="#f2efe6"/>
      </svg>
    </div>

    <div class="inner">
      <div class="kicker">
        <svg class="wave" viewBox="0 0 48 26" aria-hidden="true"><polyline points="1,13 7,13 10,4 15,22 20,7 25,19 30,13 37,13 40,5 45,13 47,13" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="by">Snad Industries</span>
      </div>
      <div class="word">THE<br>DRECKSLER</div>
      <div class="tag">A <b>VOCAL WORKBENCH</b>. Capture, chop, tune and transmit &mdash; the signal continues.</div>
    </div>

    <div class="ticker">
      <div class="tk" id="tk"></div>
    </div>
  </div>
<script>
  const items=[
    "ARM THE MICROPHONE","CAPTURE OR IMPORT WAV","CHOP · TUNE · FINALIZE",
    "SING → SNAP TO KEY","8-BAND EQ · VOCAL STRIP","STUTTER · CRUSH · VOCODER",
    "TRANSMIT TO AUDIOTOOL","THE SIGNAL CONTINUES"
  ];
  const line=items.map(t=>`<span>${t} <b>·</b></span>`).join("");
  document.getElementById("tk").innerHTML=line+line;
</script>
</body>
</html>
