<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TONEFALL — promo banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070707; --panel:#141414; --ink:#f2efe6; --dim:#8d8b82;
    --amber:#ffb228; --cyan:#2fd9c4; --pink:#ff5fa2; --screen:#0b0e0b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#000; color:var(--ink); font-family:"Space Mono",monospace;
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
  }

  /* 1200x630 — standard share/OG banner size */
  .banner{
    position:relative; width:1200px; height:630px; overflow:hidden;
    background:
      radial-gradient(120% 90% at 18% 18%, rgba(255,178,40,.16), transparent 55%),
      radial-gradient(120% 120% at 88% 92%, rgba(47,217,196,.14), transparent 55%),
      radial-gradient(90% 90% at 70% 10%, rgba(255,95,162,.10), transparent 55%),
      #070707;
    border:3px solid var(--ink); box-shadow:0 0 0 6px #000, 0 30px 80px rgba(0,0,0,.7);
  }
  /* scanlines + grid texture */
  .banner::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:3; opacity:.5;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.04) 0 1px, transparent 1px 3px);
  }
  .banner::after{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:1; opacity:.5;
    background-image:
      linear-gradient(rgba(242,239,230,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(242,239,230,.04) 1px, transparent 1px);
    background-size:34px 34px;
  }

  .inner{ position:relative; z-index:2; height:100%; display:flex; flex-direction:column;
    justify-content:center; padding:64px 70px; }

  .kicker{ display:flex; align-items:center; gap:12px; margin-bottom:22px; }
  .kicker .wave{ width:46px; height:26px; color:var(--amber); flex:0 0 auto;
    filter:drop-shadow(0 0 8px rgba(255,178,40,.6)); }
  .kicker .by{ font-family:"Silkscreen",monospace; font-size:13px; letter-spacing:4px;
    text-transform:uppercase; color:var(--dim); }

  .word{ font-family:"Silkscreen",monospace; font-weight:700; line-height:.92;
    font-size:76px; letter-spacing:2px; }
  .word .t{ color:var(--ink); text-shadow:0 0 30px rgba(242,239,230,.25); }
  .word .f{ color:var(--amber); text-shadow:0 0 34px rgba(255,178,40,.55); }

  .tag{ margin-top:20px; max-width:500px; font-size:18px; line-height:1.5; color:#d9d6cc; }
  .tag b{ color:var(--cyan); font-weight:700; }
  .tag .pk{ color:var(--pink); font-weight:700; }

  .chips{ display:flex; gap:10px; margin-top:30px; flex-wrap:wrap; }
  .chip{ font-family:"Silkscreen",monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    padding:9px 13px; border:2px solid var(--ink); background:rgba(20,20,20,.7); }
  .chip.a{ color:#000; background:var(--amber); border-color:var(--amber); }
  .chip.c{ color:#06231f; background:var(--cyan); border-color:var(--cyan); }
  .chip.p{ color:#2a0a18; background:var(--pink); border-color:var(--pink); }

  .url{ position:absolute; left:70px; bottom:42px; z-index:2; font-family:"Silkscreen",monospace;
    font-size:13px; letter-spacing:2px; color:var(--dim); }
  .url b{ color:var(--amber); }

  /* falling tetris well, right side */
  .well{ position:absolute; right:96px; top:50%; transform:translateY(-50%); z-index:2; }
  .well canvas{ display:block; }
  .well::before{ content:""; position:absolute; inset:-8px -10px; border:1px solid rgba(242,239,230,.12); border-radius:8px; pointer-events:none; }
</style>
</head>
<body>
  <div class="banner">
    <div class="well"><canvas id="tet"></canvas></div>

    <div class="inner">
      <div class="kicker">
        <svg class="wave" viewBox="0 0 48 26" aria-hidden="true">
          <polyline points="1,13 7,13 10,4 15,22 20,7 25,19 30,13 37,13 40,5 45,13 47,13"
            fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="by">Snad Industries</span>
      </div>

      <div class="word"><span class="t">TONE</span><span class="f">FALL</span></div>

      <div class="tag">
        Stack blocks, make melodies — then send your loop straight into
        <b>Audiotool</b> as <b>MIDI</b> or <span class="pk">audio</span>.
      </div>

      <div class="chips">
        <span class="chip a">browser game</span>
        <span class="chip c">midi + audio export</span>
        <span class="chip p">tonematrix</span>
      </div>
    </div>

    <div class="url">snadbreugen.github.io/<b>tonefall-audiotool</b></div>
  </div>
<script>
(function(){
  const cv=document.getElementById("tet"); if(!cv) return;
  const ctx=cv.getContext("2d");
  const COLS=5, ROWS=10, CELL=36, GAP=3, BASE=ROWS-4;   // 4-row clear zone at the bottom, taller well
  const dpr=Math.min(2,window.devicePixelRatio||1);
  cv.width=COLS*CELL*dpr; cv.height=ROWS*CELL*dpr;
  cv.style.width=(COLS*CELL)+"px"; cv.style.height=(ROWS*CELL)+"px";
  ctx.scale(dpr,dpr);

  const R=r=>BASE+r;
  const BUILD=[
    [[0,R(1)],[0,R(2)],[0,R(3)],[1,R(3)]],   // L  — left tower
    [[3,R(1)],[3,R(2)],[3,R(3)],[2,R(3)]],   // J  — right tower
    [[1,R(1)],[2,R(1)],[1,R(2)],[2,R(2)]],   // O  — centre
    [[0,R(0)],[1,R(0)],[2,R(0)],[3,R(0)]]    // I  — top bar
  ];
  const FINAL=[[4,R(0)],[4,R(1)],[4,R(2)],[4,R(3)]];   // vertical I → TETRIS

  let board, bloom, seq, idx, piece, shift, phase, flash, settleT=0, clearT=0, pauseT=0;
  function reset(){
    board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    bloom=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    seq=BUILD.concat([FINAL]); idx=0; flash=[]; phase="drop"; nextPiece();
  }
  function nextPiece(){
    piece=seq[idx];
    const minRow=Math.min(...piece.map(c=>c[1]));
    shift=minRow+(idx===seq.length-1?6:2);
  }
  function lockPiece(){ for(const [c,r] of piece){ if(r>=0&&r<ROWS) board[r][c]=1; } }

  function cell(x,y,col,glow){
    const px=x*CELL+GAP/2, py=y*CELL+GAP/2, s=CELL-GAP;
    ctx.save(); ctx.shadowColor="rgba(242,239,230,.7)"; ctx.shadowBlur=glow; ctx.fillStyle=col;
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(px,py,s,s,5);ctx.fill();} else ctx.fillRect(px,py,s,s);
    ctx.restore();
    ctx.fillStyle="rgba(255,255,255,.3)";
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(px+s*0.2,py+s*0.2,s*0.6,s*0.6,3);ctx.fill();}
  }
  function bloomDot(x,y,a){
    const cx=x*CELL+CELL/2, cy=y*CELL+CELL/2;
    const rad=CELL*(0.6+0.7*a);
    ctx.save(); ctx.globalCompositeOperation="lighter";
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    g.addColorStop(0,"rgba(255,222,150,"+(0.95*a)+")");
    g.addColorStop(0.5,"rgba(255,178,40,"+(0.55*a)+")");
    g.addColorStop(1,"rgba(255,178,40,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function draw(phx){
    ctx.clearRect(0,0,COLS*CELL,ROWS*CELL);
    for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++) if(board[y][x]) cell(x,y, flash.includes(y)?"#ffffff":"#e9e7de", flash.includes(y)?28:7);
    if(phase==="drop"&&piece){ for(const [c,r] of piece){ const yy=r-shift; if(yy>=0) cell(c,yy,"#ffffff",14); } }
    // bloom circles where the marker has triggered notes
    for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++) if(bloom[y][x]>0.02) bloomDot(x,y,bloom[y][x]);
    // marker (sweeps left→right, in canvas)
    if(phx!=null){ const mx=phx*CELL;
      ctx.save();
      if("filter" in ctx) ctx.filter="blur(2.5px)";
      ctx.globalAlpha=0.8; ctx.fillStyle="#f2efe6"; ctx.shadowColor="#f2efe6"; ctx.shadowBlur=20;
      ctx.fillRect(mx-3, 4, 6, ROWS*CELL-8);
      ctx.restore(); }
  }

  function tick(){   // drives only the falling piece
    if(phase!=="drop") return;
    if(shift>0){ shift--; }
    else { lockPiece(); idx++;
      if(idx<seq.length){ nextPiece(); }
      else { phase="flash"; flash=[R(0),R(1),R(2),R(3)]; tPhase=0; }   // wall complete → clear right now
    }
  }

  let last=0, acc=0; const DROP=150;
  const SWEEP=2667;            // one marker pass = 4 beats @ 90 bpm
  const FLASH_MS=80, PAUSE_MS=520;
  let phT=0, prevCol=-1, tPhase=0;
  function loop(t){
    if(!last)last=t; const dt=t-last; last=t;
    if(phase==="drop"){ acc+=dt; while(acc>=DROP){ tick(); acc-=DROP; } }
    else if(phase==="flash"){ tPhase+=dt; if(tPhase>=FLASH_MS){ board.splice(R(0),4); for(let k=0;k<4;k++) board.unshift(Array(COLS).fill(0)); flash=[]; phase="pause"; tPhase=0; } }
    else if(phase==="pause"){ tPhase+=dt; if(tPhase>=PAUSE_MS){ reset(); } }
    // marker sweep (restarts each loop with the build → choreographed)
    phT=(phT+dt)%SWEEP;
    const phx=(phT/SWEEP)*COLS;
    const col=Math.floor(phx);
    if(col!==prevCol){
      for(let r=0;r<ROWS;r++) if(board[r] && board[r][col]) bloom[r][col]=1;
      prevCol=col;
    }
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) if(bloom[r][c]>0) bloom[r][c]*=0.90;
    draw(phx);
    requestAnimationFrame(loop);
  }
  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
